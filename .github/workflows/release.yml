name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python OSS SDK
        run: pip install oss2

      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: crafto
          OSS_ENDPOINT: oss-cn-beijing.aliyuncs.com
          OSS_CDN_DOMAIN: lingostatic.tweet.net.cn
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "📦 上传 cli v${VERSION} 到 OSS..."
          
          python3 << PYEOF
          import oss2, os, glob
          
          ak = os.environ.get("OSS_ACCESS_KEY_ID")
          sk = os.environ.get("OSS_ACCESS_KEY_SECRET")
          if not ak or not sk:
              print("Skipping OSS upload, credentials missing.")
              exit(0)
              
          bucket_name = os.environ.get("OSS_BUCKET")
          endpoint = os.environ.get("OSS_ENDPOINT")
          cdn = os.environ.get("OSS_CDN_DOMAIN")
          prefix = "tools/tabpilot-tools"
          version = "${VERSION}"
          
          auth = oss2.Auth(ak, sk)
          bucket = oss2.Bucket(auth, f"https://{endpoint}", bucket_name)
          
          # Map goreleaser terms to Pilot platform terms
          arch_map = {"amd64": "x64", "arm64": "arm64"}
          os_map = {"darwin": "darwin", "linux": "linux", "windows": "win"}
          
          files = glob.glob("dist/*.tar.gz")
          for f in files:
              name = os.path.basename(f)
              parts = name.replace(".tar.gz", "").split("-")
              if len(parts) >= 4:
                  file_os = parts[-2]
                  file_arch = parts[-1]
                  pkg_name = "-".join(parts[:-3]) # "lark-cli"
                  
                  p_os = os_map.get(file_os, file_os)
                  p_arch = arch_map.get(file_arch, file_arch)
                  
                  platform_key = f"{p_os}-{p_arch}"
                  key = f"{prefix}/{platform_key}/{pkg_name}.tar.gz"
                  bucket.put_object_from_file(key, f)
                  print(f"  OK {name} -> https://{cdn}/{key}")
                  
                  v_key = f"{prefix}/history/v{version}/{platform_key}/{pkg_name}.tar.gz"
                  bucket.put_object_from_file(v_key, f)
                  print(f"  OK (Backup) {name} -> https://{cdn}/{v_key}")
          PYEOF
